<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/tasks.css" />
  <script src="/js/page-transition.js"></script>
</head>

<body class="page-shell">
  <header class="app-header">
    <nav class="container app-nav">
      <h1 class="app-brand">StudyFlow Planner</h1>

      <div class="app-nav-actions">
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/courses-page" class="btn btn-outline-light btn-sm">Courses</a>
        <a href="/tasks-page" class="btn btn-light btn-sm">Tasks</a>
        <a href="/schedule-page" class="btn btn-outline-light btn-sm">Schedule</a>

        <form action="/auth/logout" method="POST" class="d-inline">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </div>
    </nav>
  </header>

  <main class="container page-main">
    <section class="section-block">
      <div class="mb-3">
        <h2 class="page-title h3">Tasks</h2>
        <p class="page-subtitle">Create and manage your assignments and study tasks.</p>
      </div>

      <div class="content-card card form-card">
        <div class="card-body">
          <form id="taskForm" class="row g-3">
            <input type="hidden" id="taskId" />

            <div class="col-md-4">
              <label for="courseId" class="form-label">Course</label>
              <select id="courseId" class="form-select" required></select>
            </div>

            <div class="col-md-4">
              <label for="title" class="form-label">Task Title</label>
              <input type="text" id="title" class="form-control" required />
            </div>

            <div class="col-md-4">
              <label for="dueDate" class="form-label">Due Date</label>
              <input type="date" id="dueDate" class="form-control" required />
            </div>

            <div class="col-md-4">
              <label for="priority" class="form-label">Priority</label>
              <select id="priority" class="form-select">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="status" class="form-label">Status</label>
              <select id="status" class="form-select">
                <option value="Pending" selected>Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="In Review">In Review</option>
                <option value="Completed">Completed</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="estimatedHours" class="form-label">Estimated Hours</label>
              <input type="number" id="estimatedHours" class="form-control" value="1" min="1" />
            </div>

            <div class="col-12">
              <label for="description" class="form-label">Description</label>
              <textarea id="description" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-12 form-actions">
              <button type="submit" class="btn btn-primary">Save Task</button>
              <button type="button" id="resetBtn" class="btn btn-secondary">Clear</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section class="kanban-section">
      <div id="messageBox" class="message-box mb-3"></div>
      <div id="tasksContainer" class="kanban-board"></div>
    </section>
  </main>

  <script src="/js/tasks.js"></script>
</body>

</html>
