<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/courses.css" />
  <script src="/js/page-transition.js"></script>
</head>
<body class="page-shell">
  <header class="app-header">
    <nav class="container app-nav">
      <h1 class="app-brand">StudyFlow Planner</h1>

      <div class="app-nav-actions">
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/courses-page" class="btn btn-light btn-sm">Courses</a>
        <a href="/tasks-page" class="btn btn-outline-light btn-sm">Tasks</a>
        <a href="/schedule-page" class="btn btn-outline-light btn-sm">Schedule</a>

        <form action="/auth/logout" method="POST" class="d-inline">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </div>
    </nav>
  </header>

  <main class="container page-main">
    <section class="section-block">
      <div class="mb-3">
        <h2 class="page-title h3">Courses</h2>
        <p class="page-subtitle">Add and manage your registered courses.</p>
      </div>

      <div class="content-card card form-card">
        <div class="card-body">
          <form id="courseForm" class="row g-3">
            <input type="hidden" id="courseId" name="courseId" />

            <div class="col-md-4">
              <label for="title" class="form-label">Course Title</label>
              <input type="text" id="title" name="title" class="form-control" required />
            </div>

            <div class="col-md-3">
              <label for="code" class="form-label">Course Code</label>
              <input type="text" id="code" name="code" class="form-control" required />
            </div>

            <div class="col-md-3">
              <label for="semester" class="form-label">Semester</label>
              <input
                type="text"
                id="semester"
                name="semester"
                class="form-control"
                value="2nd Semester, 2026"
              />
            </div>

            <div class="col-md-2">
              <label for="color" class="form-label">Color</label>
              <input
                type="color"
                id="color"
                name="color"
                class="form-control form-control-color"
                value="#0d6efd"
              />
            </div>

            <div class="col-12 form-actions">
              <button type="submit" class="btn btn-primary">Save Course</button>
              <button type="button" id="resetBtn" class="btn btn-secondary">Clear</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section>
      <h3 class="h5 mb-3">Your Course List</h3>
      <div id="messageBox" class="message-box mb-3"></div>
      <div id="coursesContainer" class="row g-3 course-grid"></div>
    </section>
  </main>

  <script src="/js/courses.js"></script>
</body>
</html>
