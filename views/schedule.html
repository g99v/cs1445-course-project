<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/schedule.css" />
    <script src="/js/page-transition.js"></script>
</head>

<body class="page-shell">
    <header class="app-header">
        <nav class="container app-nav">
            <h1 class="app-brand">StudyFlow Planner</h1>

            <div class="app-nav-actions">
                <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="/courses-page" class="btn btn-outline-light btn-sm">Courses</a>
                <a href="/tasks-page" class="btn btn-outline-light btn-sm">Tasks</a>
                <a href="/schedule-page" class="btn btn-light btn-sm">Schedule</a>

                <form action="/auth/logout" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                </form>
            </div>
        </nav>
    </header>

    <main class="container page-main">
        <section class="section-block">
            <div class="mb-3">
                <h2 class="page-title h3">Weekly Schedule</h2>
                <p class="page-subtitle">Add lecture sessions and view them in a timetable.</p>
            </div>

            <div class="content-card card form-card">
                <div class="card-body">
                    <form id="lectureForm" class="row g-3">
                        <input type="hidden" id="lectureId" />

                        <div class="col-md-4">
                            <label for="courseId" class="form-label">Course</label>
                            <select id="courseId" class="form-select" required></select>
                        </div>

                        <div class="col-md-4">
                            <label for="dayOfWeek" class="form-label">Day</label>
                            <select id="dayOfWeek" class="form-select" required>
                                <option value="Sunday">Sunday</option>
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="type" class="form-label">Type</label>
                            <select id="type" class="form-select">
                                <option value="Lecture">Lecture</option>
                                <option value="Lab">Lab</option>
                                <option value="Tutorial">Tutorial</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label for="startTime" class="form-label">Start Time</label>
                            <input type="time" id="startTime" class="form-control" required />
                        </div>

                        <div class="col-md-3">
                            <label for="endTime" class="form-label">End Time</label>
                            <input type="time" id="endTime" class="form-control" required />
                        </div>

                        <div class="col-md-3">
                            <label for="room" class="form-label">Room</label>
                            <input type="text" id="room" class="form-control" />
                        </div>

                        <div class="col-md-3">
                            <label for="instructor" class="form-label">Instructor</label>
                            <input type="text" id="instructor" class="form-control" />
                        </div>

                        <div class="col-12 form-actions">
                            <button type="submit" class="btn btn-primary">Save Lecture</button>
                            <button type="button" id="resetBtn" class="btn btn-secondary">Clear</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section class="section-block">
            <div id="messageBox" class="message-box mb-3"></div>
            <div class="schedule-board-wrapper">
                <div id="scheduleGrid"></div>
            </div>
        </section>

        <section>
            <h3 class="h5 mb-3">Lecture List</h3>
            <div id="lectureList" class="row g-3"></div>
        </section>
    </main>

    <script src="/js/schedule.js"></script>
</body>

</html>
