<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/schedule.css" />
  <script src="/js/page-transition.js"></script>
</head>

<body class="page-shell">
  <header class="app-header">
    <nav class="container app-nav">
      <h1 class="app-brand">StudyFlow Planner</h1>

      <div class="app-nav-actions">
        <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/courses-page" class="btn btn-outline-light btn-sm">Courses</a>
        <a href="/tasks-page" class="btn btn-outline-light btn-sm">Tasks</a>
        <a href="/schedule-page" class="btn btn-outline-light btn-sm">Schedule</a>

        <form action="/auth/logout" method="POST" class="d-inline">
          <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
      </div>
    </nav>
  </header>

  <main class="container page-main">
    <section class="section-block">
      <h2 class="page-title h3">Task Dashboard</h2>
      <p class="page-subtitle">Your tasks grouped by urgency.</p>
    </section>

    <section class="row g-3 section-block" id="summaryCards"></section>

    <section class="row g-3" id="dashboardColumns"></section>

    <section class="section-block">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h2 class="h4 mb-1">Weekly Schedule Preview</h2>
          <p class="page-subtitle">A compact view of your lecture timetable.</p>
        </div>
        <a href="/schedule-page" class="btn btn-primary btn-sm">Open Full Schedule</a>
      </div>

      <div class="content-card card">
        <div class="card-body">
          <div class="schedule-board-wrapper">
            <div id="dashboardSchedulePreview"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/dashboard.js"></script>
</body>

</html>
